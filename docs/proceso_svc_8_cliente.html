<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proceso de Obra - Guía para Clientes</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #002b5e;
            --secondary: #00f5ff;
            --text-light: #f4f6f8;
            --bg-dark: #121212;
            --panel-bg: rgba(255, 255, 255, 0.05);
        }
        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 50px;
            position: relative;
        }
        .back-btn {
            position: absolute;
            top: 0;
            left: 0;
            background: rgba(255,255,255,0.1);
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: 0.3s;
        }
        .back-btn:hover {
            background: rgba(0,245,255,0.2);
            border-color: var(--secondary);
            color: var(--secondary);
        }
        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 36px;
            color: var(--secondary);
            margin-bottom: 10px;
            text-transform: uppercase;
            margin-top: 40px;
        }
        .header p {
            font-size: 18px;
            color: #aaa;
            max-width: 700px;
            margin: 0 auto;
        }
        .comic-container {
            background: var(--panel-bg);
            border: 2px solid var(--secondary);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 50px;
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.1);
        }
        .comic-img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <a href="pricebook.html" class="back-btn" data-i18n="nav_back_pb">← Volver al Catálogo</a>
            <h1 data-i18n="pb_svc_8_name">Sistemas de Expansión Térmica</h1>
            <p data-i18n="pb_svc_8_user">Proteja su plomería de picos de presión peligrosos.</p>
        </div>

        <div class="comic-container" style="text-align: center; max-width: 900px; margin: 0 auto;">
            <!-- Single full comic page for the service -->
            <img src="../assets/pb_svc_8.png" alt="Comic Service 8" style="width: 100%; border-radius: 12px; box-shadow: 0 0 20px rgba(0, 245, 255, 0.3); border: 2px solid var(--neon-cyan);">
            
            <!-- Multilingual Subtitles Reference -->
            <div class="comic-subtitles" style="margin-top: 25px; background: rgba(10, 15, 30, 0.8); padding: 25px; border-radius: 12px; border-left: 5px solid var(--neon-cyan); text-align: left; box-shadow: inset 0 0 15px rgba(0, 245, 255, 0.1);">
                <h3 style="color: var(--neon-cyan); margin-bottom: 15px; font-family: 'Orbitron', sans-serif; font-size: 1.2rem; display: flex; align-items: center; gap: 10px;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg>
                    <span data-i18n="lbl_subtitles">Traducción de Historieta</span>
                </h3>
                <ul style="color: #e2e8f0; line-height: 2; margin-left: 20px; font-size: 1.05rem;">
                    <li><strong style="color: #ffaa00;">1:</strong> <span data-i18n="svc_8_step_1">Step 1</span></li>
                    <li><strong style="color: #ffaa00;">2:</strong> <span data-i18n="svc_8_step_2">Step 2</span></li>
                    <li><strong style="color: #ffaa00;">3:</strong> <span data-i18n="svc_8_step_3">Step 3</span></li>
                    <li><strong style="color: #ffaa00;">4:</strong> <span data-i18n="svc_8_step_4">Step 4</span></li>
                </ul>
            </div>
        </div>

        <div class="header" style="margin-top: 40px;">
            <p style="color: #ffaa00; font-size: 1.2rem; font-family: 'Orbitron';"><span data-i18n="lbl_tecnico">Detalle Técnico (Ingeniería)</span></p>
            <p data-i18n="pb_svc_8_tech" style="color: #bbb; max-width: 800px; margin: 10px auto; font-size: 16px;"></p>
        </div>
    </div>

    <script src="../app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const currentLang = localStorage.getItem('morales_lang') || 'es';
            if(window.setLanguage) window.setLanguage(currentLang);
        });
    </script>
</body>
</html>
