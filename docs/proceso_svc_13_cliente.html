<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proceso de Obra - Guía para Clientes</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #002b5e;
            --secondary: #00f5ff;
            --text-light: #f4f6f8;
            --bg-dark: #121212;
            --panel-bg: rgba(255, 255, 255, 0.05);
        }
        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 0;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 50px;
            position: relative;
        }
        .back-btn {
            position: absolute;
            top: 0;
            left: 0;
            background: rgba(255,255,255,0.1);
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: 0.3s;
        }
        .back-btn:hover {
            background: rgba(0,245,255,0.2);
            border-color: var(--secondary);
            color: var(--secondary);
        }
        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 36px;
            color: var(--secondary);
            margin-bottom: 10px;
            text-transform: uppercase;
            margin-top: 40px;
        }
        .header p {
            font-size: 18px;
            color: #aaa;
            max-width: 700px;
            margin: 0 auto;
        }
        .comic-container {
            background: var(--panel-bg);
            border: 2px solid var(--secondary);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 50px;
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.1);
        }
        .comic-img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <a href="pricebook.html" class="back-btn" data-i18n="nav_back_pb">← Volver al Catálogo</a>
            <h1 data-i18n="pb_svc_13_name">Servicio 13</h1>
            <p data-i18n="pb_svc_13_user">Descripción del servicio.</p>
        </div>

        <div class="comic-container">
            <!-- Placeholder logic for non-generated comics -->
            <img src="../assets/img/svc_13_comic.png" onerror="this.src='../assets/img/repipe_comic.png'" alt="Proceso en Cómic" class="comic-img">
        </div>

        <div class="header" style="margin-top: 40px;">
            <p style="color: #ffaa00; font-size: 1.2rem; font-family: 'Orbitron';"><span data-i18n="lbl_tecnico">Detalle Técnico (Ingeniería)</span></p>
            <p data-i18n="pb_svc_13_tech" style="color: #bbb; max-width: 800px; margin: 10px auto; font-size: 16px;"></p>
        </div>
    </div>

    <script src="../app.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const currentLang = localStorage.getItem('morales_lang') || 'es';
            if(window.setLanguage) window.setLanguage(currentLang);
        });
    </script>
</body>
</html>
