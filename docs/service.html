<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORION Price Book - Service Details</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .service-detail-container { max-width: 1000px; margin: 120px auto 50px auto; padding: 40px; background: rgba(10, 15, 30, 0.65); border: 1px solid rgba(0, 245, 255, 0.2); border-radius: 24px; backdrop-filter: blur(15px); box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1); }
        .service-header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 20px; }
        .service-title { font-size: 2.5em; font-weight: 800; color: #ffffff; letter-spacing: -0.5px; text-shadow: 0 0 20px rgba(0, 245, 255, 0.4); margin: 0; }
        .service-code { font-family: monospace; background: rgba(0, 245, 255, 0.1); color: var(--neon-cyan); padding: 5px 12px; border-radius: 6px; font-size: 0.9em; letter-spacing: 1px; border: 1px solid rgba(0, 245, 255, 0.3); }
        .service-content-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: start; }
        .service-image { width: 100%; height: auto; border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); border: 1px solid rgba(255, 140, 0, 0.3); object-fit: cover; }
        .service-text-block { color: #d0d0d0; font-size: 1.05em; line-height: 1.7; }
        .service-text-block p { margin-bottom: 20px; }
        .tech-spec-header { color: var(--neon-orange); font-size: 1.3em; margin-top: 30px; margin-bottom: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .tier-list { list-style: none; padding: 0; margin: 0; }
        .tier-list li { background: rgba(0,0,0,0.3); border-left: 4px solid var(--neon-cyan); padding: 15px 20px; margin-bottom: 15px; border-radius: 0 8px 8px 0; font-size: 0.95em; }
        .tier-list li.tier-good { border-color: #b0c4de; }
        .tier-list li.tier-better { border-color: var(--neon-cyan); }
        .tier-list li.tier-best { border-color: var(--neon-orange); }
        .back-btn { display: inline-block; margin-top: 30px; padding: 12px 25px; background: transparent; color: var(--neon-cyan); border: 1px solid var(--neon-cyan); border-radius: 8px; text-decoration: none; font-weight: 600; transition: all 0.3s ease; }
        .back-btn:hover { background: rgba(0, 245, 255, 0.1); box-shadow: 0 0 15px rgba(0, 245, 255, 0.3); transform: translateY(-2px); }
        @media (max-width: 900px) { .service-content-grid { grid-template-columns: 1fr; } }
    </style>
    <link rel="stylesheet" href="../universe.css">
</head>
<body>
    <!-- UNIVERSE BACKGROUND -->
    <canvas id="universe-canvas" data-universe-mode="nebula"></canvas>
    <div class="universe-overlay u-variant-service"></div>
    <script src="../universe.js"></script>

    <div id="warp-canvas"></div>
    <div class="layer layer-1"></div>
    <div class="layer layer-2"></div>
    <div class="layer layer-3"></div>

    <header>
        <div class="logo">ORION <span style="font-weight: 300;">TECH</span></div>
        <div class="lang-switch">
            <button onclick="setLanguage('en')">EN</button>
            <button onclick="setLanguage('es')">ES</button>
            <button onclick="setLanguage('zh')">中文</button>
            <button onclick="setLanguage('tl')">TL</button>
            <button onclick="setLanguage('vi')">VI</button>
        </div>
    </header>

    <div class="service-detail-container animate-in">
        <div class="service-header">
            <h1 class="service-title" id="dyn-title" data-i18n="svc_1_title">Service Title</h1>
            <span class="service-code" id="dyn-code">OR-CODE</span>
        </div>

        <div class="service-content-grid">
            <div class="service-image-wrapper">
                <img id="dyn-img" src="../assets/images/service_1.png" alt="Service Image" class="service-image">
            </div>
            
            <div class="service-text-block">
                <p id="dyn-p1" data-i18n="svc_1_p1"></p>
                <p id="dyn-p2" data-i18n="svc_1_p2"></p>

                <h2 class="tech-spec-header" data-i18n="lbl_tech_specs">Technical Specifications</h2>
                <ul class="tier-list">
                    <li class="tier-good" id="dyn-good" data-i18n="svc_1_good"></li>
                    <li class="tier-better" id="dyn-better" data-i18n="svc_1_better"></li>
                    <li class="tier-best" id="dyn-best" data-i18n="svc_1_best"></li>
                </ul>

                <a href="pricebook.html" class="back-btn" data-i18n="nav_back">← Back to Catalog</a>
            </div>
        </div>
    </div>
    
    <script src="../app.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let sid = urlParams.get('id') || 1;
        
        const codes = {
            1: "OR-DIAG-001", 2: "OR-REP-002", 3: "OR-FIL-003", 4: "OR-IOT-004", 5: "OR-CAM-005",
            6: "OR-SWR-006", 7: "OR-HTR-007", 8: "OR-PRV-008", 9: "OR-EMG-009", 10: "OR-CAD-010",
            11: "OR-TNK-011", 12: "OR-BFL-012", 13: "OR-FIX-013", 14: "OR-CHM-014", 15: "OR-JET-015"
        };
        
        document.getElementById('dyn-code').innerText = codes[sid] || "OR-XXX";
        document.getElementById('dyn-img').src = "../assets/images/service_" + sid + ".png";
        
        document.getElementById('dyn-title').setAttribute('data-i18n', 'svc_' + sid + '_title');
        document.getElementById('dyn-p1').setAttribute('data-i18n', 'svc_' + sid + '_p1');
        document.getElementById('dyn-p2').setAttribute('data-i18n', 'svc_' + sid + '_p2');
        document.getElementById('dyn-good').setAttribute('data-i18n', 'svc_' + sid + '_good');
        document.getElementById('dyn-better').setAttribute('data-i18n', 'svc_' + sid + '_better');
        document.getElementById('dyn-best').setAttribute('data-i18n', 'svc_' + sid + '_best');
        
        if (typeof setLanguage === 'function') {
            setLanguage(localStorage.getItem('morales_lang') || 'es');
        }
    </script>
</body>
</html>
