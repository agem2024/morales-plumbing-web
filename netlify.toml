# ============================================================
#  MORALES PLUMBING — Netlify Configuration
#  Security Headers + Redirects + Functions
# ============================================================

[build]
  functions = "netlify/functions"
  publish = "."

# ── Security & Compliance Headers ──────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self' https: 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: https: blob:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.openai.com https://generativelanguage.googleapis.com https://*.googleapis.com https://*.firebaseio.com https://*.firebaseapp.com; frame-ancestors 'none';"

# ── Block access to dev/internal files ─────────────────────
[[headers]]
  for = "/*.env"
  [headers.values]
    X-Robots-Tag = "noindex"

# ── Redirects: 404 custom page ──────────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Cache: static assets ───────────────────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"
