<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morales Plumbing | Un Plomero En Tu Bolsillo</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&family=Permanent+Marker&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #050505;
            --neon-cyan: #00f5ff;
            --neon-orange: #ff8c00;
            --neon-lime: #39ff14;
            --neon-purple: #a855f7;
            --card-bg: rgba(10, 15, 30, 0.85);
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }
        .card-container {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            border: 1px solid rgba(0, 245, 255, 0.2);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 245, 255, 0.15), inset 0 0 20px rgba(0, 0, 0, 0.8);
            position: relative;
        }
        .video-header {
            width: 100%;
            height: 220px;
            position: relative;
            overflow: hidden;
            border-bottom: 2px solid var(--neon-cyan);
        }
        .video-header video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
        }
        .video-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.9) 100%);
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 20px;
        }
        .company-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 5px;
        }
        .logo-static {
            width: 60px;
            height: 60px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(0, 245, 255, 0.8));
        }
        .slogan {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-lime);
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.6);
            text-align: center;
        }
        .card-body {
            padding: 30px 20px;
            text-align: center;
        }
        .company-name {
            font-family: 'Permanent Marker', cursive;
            font-size: 2.1rem;
            color: var(--neon-orange);
            margin: 0;
            text-shadow: 2px 2px 0px #000, 0 0 15px rgba(255, 140, 0, 0.8), 0 0 30px var(--neon-purple), 0 0 45px var(--neon-purple);
            font-weight: normal;
            text-align: left;
            line-height: 1.1;
            transform: rotate(-3deg);
            letter-spacing: 1px;
            margin-top: 5px;
        }
        .license {
            font-size: 1.2rem;
            color: #a0aec0;
            margin-bottom: 30px;
            letter-spacing: 1px;
            font-family: 'Orbitron', sans-serif;
        }
        .license span {
            color: var(--neon-cyan);
            font-weight: bold;
        }
        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 30px;
        }
        .contact-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
            text-decoration: none;
            color: #fff;
        }
        .contact-item:hover {
            background: rgba(0, 245, 255, 0.1);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 245, 255, 0.2);
            transform: translateY(-2px);
        }
        .contact-icon {
            font-size: 1.5rem;
            color: var(--neon-cyan);
        }
        .contact-text {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .action-buttons {
            display: flex;
            gap: 15px;
        }
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-call {
            background: transparent;
            border: 2px solid var(--neon-lime);
            color: var(--neon-lime);
            box-shadow: 0 0 10px rgba(57, 255, 20, 0.2);
        }
        .btn-call:hover {
            background: var(--neon-lime);
            color: #000;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.6);
        }
        .btn-site {
            background: rgba(0, 245, 255, 0.1);
            border: 2px solid var(--neon-cyan);
            color: var(--neon-cyan);
        }
        .btn-site:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.6);
        }
        .social-links {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 25px;
        }
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            color: #fff;
            text-decoration: none;
            font-size: 1.4rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .social-btn.fb:hover {
            background: #1877F2;
            border-color: #1877F2;
            box-shadow: 0 0 15px #1877F2;
        }
        .social-btn.ig:hover {
            background: #E4405F;
            border-color: #E4405F;
            box-shadow: 0 0 15px #E4405F;
        }
        .social-btn.yt:hover {
            background: #FF0000;
            border-color: #FF0000;
            box-shadow: 0 0 15px #FF0000;
        }
        .lang-switcher {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 10;
            display: flex;
            gap: 5px;
            background: rgba(0, 0, 0, 0.6);
            padding: 5px;
            border-radius: 20px;
            border: 1px solid rgba(0, 245, 255, 0.3);
        }
        .lang-btn {
            background: transparent;
            border: none;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 15px;
            transition: 0.3s;
        }
        .lang-btn.active {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 10px var(--neon-cyan);
        }
    </style>
</head>
<body>

<div class="card-container">
    <div class="video-header">
        <div class="lang-switcher">
            <button class="lang-btn active" onclick="setLang('es', this)">ES</button>
            <button class="lang-btn" onclick="setLang('en', this)">EN</button>
            <button class="lang-btn" onclick="setLang('zh', this)">ZH</button>
            <button class="lang-btn" onclick="setLang('tl', this)">TL</button>
            <button class="lang-btn" onclick="setLang('vi', this)">VI</button>
        </div>
        <video autoplay loop muted playsinline>
            <source src="assets/morales_logo_video.mp4" type="video/mp4">
        </video>
        <div class="video-overlay">
            <div class="slogan" id="t_slogan">Un Plomero En Tu Bolsillo</div>
        </div>
    </div>
    
    <div class="card-body">
        <div class="company-header">
            <img src="assets/logo_portada.png" alt="Morales Logo" class="logo-static">
            <div>
                <h1 class="company-name">MORALES<br>PLUMBING</h1>
            </div>
        </div>
        <div class="license" style="text-align: left; padding-left: 75px; margin-top: -5px;">C-36 #<span>1156542</span></div>
        
        <div class="contact-info">
            <a href="tel:+16692342444" class="contact-item">
                <i class="fas fa-phone-alt contact-icon"></i>
                <span class="contact-text">(669) 234-2444</span>
            </a>
            <a href="mailto:moralesplumbing026@gmail.com" class="contact-item">
                <i class="fas fa-envelope contact-icon" style="color: var(--neon-lime);"></i>
                <span class="contact-text" style="font-size: 1.1rem; letter-spacing: 0;">moralesplumbing026@gmail.com</span>
            </a>
            <a href="https://maps.google.com/?q=San+Jose,+CA" target="_blank" class="contact-item">
                <i class="fas fa-map-marker-alt contact-icon" style="color: var(--neon-orange);"></i>
                <span class="contact-text">San Jose, CA</span>
            </a>
            <a href="https://www.youtube.com/@MoralesPlumbing" target="_blank" class="contact-item">
                <i class="fab fa-youtube contact-icon" style="color: #FF0000;"></i>
                <div style="display:flex; flex-direction:column; align-items:center;">
                    <span class="contact-text" style="font-size: 1.1rem; letter-spacing: 0;">@MoralesPlumbing</span>
                    <span id="t_yt_joined" style="font-size: 0.75rem; color: #a0aec0; letter-spacing: 0; margin-top: 2px;">Se unió el 22 jun 2026</span>
                </div>
            </a>
        </div>
        
        <div class="social-links">
            <a href="#" class="social-btn fb" aria-label="Facebook" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="#" class="social-btn ig" aria-label="Instagram" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="#" class="social-btn tk" aria-label="TikTok" target="_blank"><i class="fab fa-tiktok"></i></a>
            <a href="https://www.youtube.com/@MoralesPlumbing" class="social-btn yt" aria-label="YouTube" target="_blank"><i class="fab fa-youtube"></i></a>
        </div>
        
        <div class="action-buttons">
            <a href="tel:+16692342444" style="text-decoration: none; flex: 1; display: flex;">
                <button class="btn btn-call"><i class="fas fa-phone"></i> <span id="t_call">Llamar</span></button>
            </a>
            <a href="index.html" style="text-decoration: none; flex: 1; display: flex;">
                <button class="btn btn-site"><i class="fas fa-globe"></i> <span id="t_web">Web</span></button>
            </a>
        </div>
    </div>
</div>

<script>
    const translations = {
        es: {
            slogan: "Un Plomero En Tu Bolsillo",
            call: "Llamar",
            web: "Web",
            yt_joined: "Se unió el 22 jun 2026"
        },
        en: {
            slogan: "A Plumber In Your Pocket",
            call: "Call",
            web: "Website",
            yt_joined: "Joined Jun 22, 2026"
        },
        zh: {
            slogan: "你口袋里的水管工",
            call: "呼叫",
            web: "网站",
            yt_joined: "于2026年6月22日加入"
        },
        tl: {
            slogan: "Tubero Sa Iyong Bulsa",
            call: "Tawagan",
            web: "Website",
            yt_joined: "Sumali noong Hunyo 22, 2026"
        },
        vi: {
            slogan: "Thợ Sửa Ống Nước Trong Túi Bạn",
            call: "Gọi",
            web: "Trang Web",
            yt_joined: "Tham gia 22 thg 6, 2026"
        }
    };

    function setLang(lang, btnElement) {
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');
        
        document.getElementById('t_slogan').innerText = translations[lang].slogan;
        document.getElementById('t_call').innerText = translations[lang].call;
        document.getElementById('t_web').innerText = translations[lang].web;
        document.getElementById('t_yt_joined').innerText = translations[lang].yt_joined;
    }
</script>

</body>
</html>
